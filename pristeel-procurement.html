<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRISTEEL — Procurement Platform</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bebas+Neue&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F8FA;--bg2:#EFF1F5;--bg3:#E8EBF0;
  --bg-card:#FFFFFF;--bg-hover:#EFF1F5;
  --text:#1A1F2E;--text2:#5A6478;--text3:#9AA3B2;
  --border:#E4E7ED;--border2:#CDD2DC;
  --bronze:#B87333;--bronze-light:#CA8E55;--bronze-dark:#8A5220;
  --bronze-bg:rgba(184,115,51,0.09);--bronze-text:#7A4510;
  --green:#1a6b4a;--green-bg:rgba(26,107,74,0.09);--green-text:#1a6b4a;
  --red:#c0392b;--red-bg:rgba(192,57,43,0.09);--red-text:#c0392b;
  --blue:#2563EB;--blue-bg:rgba(37,99,235,0.09);--blue-text:#2563EB;
  --radius:6px;--radius-lg:10px;
}
body{font-family:'Inter',sans-serif;background:#F7F8FA;color:var(--text);font-size:14px;line-height:1.5}
/* LAYOUT */
.app-shell{display:flex;min-height:100vh}
.sidebar{width:220px;background:#1C2333;border-right:none;box-shadow:2px 0 8px rgba(0,0,0,0.08);padding:0;flex-shrink:0;display:flex;flex-direction:column}
.sidebar-logo{padding:20px 20px 18px;border-bottom:0.5px solid #8A5220}
.logo-mark{font-family:'Bebas Neue',sans-serif;font-size:28px;font-weight:400;color:var(--bronze);letter-spacing:2px;line-height:1}
.logo-sub{font-size:10px;color:#707070;margin-top:4px;letter-spacing:1.5px;text-transform:uppercase}
.sidebar-nav{padding:12px 0;flex:1}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;cursor:pointer;color:#8A95A8;font-size:12px;font-weight:500;transition:all .2s;border-left:2px solid transparent;letter-spacing:.3px}
.nav-item:hover{background:rgba(184,115,51,0.12);color:#d0d0d0;border-left-color:#666}
.nav-item.active{background:rgba(184,115,51,0.15);color:#ffffff;border-left-color:var(--bronze)}
.nav-item svg{stroke:#909090}
.nav-item.active svg{stroke:#ffffff}.nav-item:hover svg{stroke:#ffffff}
.nav-item svg{width:16px;height:16px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nav-section{color:#4a7090 !important;font-size:9px;font-weight:600;color:#505050;letter-spacing:1.5px;padding:20px 20px 6px;text-transform:uppercase}
.sidebar-footer{padding:16px 20px;border-top:0.5px solid #8A5220;font-size:10px;color:#606060;letter-spacing:.3px}
.main{flex:1;overflow-y:auto}
.topbar{background:var(--bg);border-bottom:0.5px solid var(--border);padding:14px 28px;display:flex;justify-content:space-between;align-items:center}
.topbar-title{font-size:15px;font-weight:600;color:var(--text);letter-spacing:.2px}
.topbar-sub{font-size:11px;color:var(--text3);margin-top:2px;letter-spacing:.3px;text-transform:uppercase}
.content{padding:24px 28px}
/* PAGES */
.page{display:none}
.page.active{display:block}
/* CARDS */
.card{background:var(--bg-card);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:20px 24px;margin-bottom:16px;transition:border-color .2s}
.card:hover{border-color:var(--border2)}
.card-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:8px;letter-spacing:.3px}
/* FORMS */
.field-group{display:grid;gap:12px;margin-bottom:14px}
.fg-2{grid-template-columns:1fr 1fr}
.fg-3{grid-template-columns:1fr 1fr 1fr}
.fg-4{grid-template-columns:1fr 1fr 1fr 1fr}
label.lbl{font-size:10px;font-weight:600;color:var(--text3);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.8px}
input[type=text],input[type=email],input[type=number],input[type=date],select,textarea{
  width:100%;padding:8px 10px;border:0.5px solid var(--border);border-radius:var(--radius);
  font-size:13px;color:var(--text);background:var(--bg);transition:border .2s;outline:none;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:var(--bronze);box-shadow:0 0 0 3px rgba(184,115,51,.12)}
input::placeholder,textarea::placeholder{color:var(--text3)}
textarea{resize:vertical;min-height:90px;line-height:1.6}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius);font-size:12px;font-weight:500;cursor:pointer;border:0.5px solid var(--border2);background:transparent;color:var(--text2);transition:all .2s;letter-spacing:.3px}
.btn:hover{background:var(--bg-hover);color:var(--text);border-color:var(--border2)}
.btn-primary{background:var(--bronze);color:#fff;border-color:transparent;font-weight:600;letter-spacing:.5px}
